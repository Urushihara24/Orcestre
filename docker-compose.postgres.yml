version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: egs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: egs_bot
      POSTGRES_USER: egs_user
      POSTGRES_PASSWORD: egs_pass
    ports:
      - "5432:5432"
    volumes:
      - egs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egs_user -d egs_bot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  egs_postgres_data:
